<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempShare Cloud - Fast File Transfer</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 32px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 32px 0;
            position: relative;
        }
        .divider::after {
            content: "OR";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            padding: 0 12px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }
        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            display: none;
            word-break: break-all;
        }
        .success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .code-display {
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            margin: 12px 0;
            display: block;
            color: var(--primary);
            background: #eeeefd;
            padding: 10px;
            border-radius: 4px;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>TempShare Cloud</h1>
            <p class="subtitle">Cloud-powered sharing. PC can be OFF.</p>

            <div class="form-group">
                <label for="fileInput">Choose any file (PDF, Code, etc.)</label>
                <input type="file" id="fileInput">
            </div>
            <button id="uploadBtn" onclick="uploadFile()">Upload to Cloud</button>

            <div id="result"></div>

            <div class="divider"></div>

            <div class="form-group">
                <label for="codeInput">Enter Cloud URL / Code</label>
                <input type="text" id="codeInput" placeholder="Paste link or code here">
            </div>
            <button onclick="downloadFile()">Get File</button>
        </div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        const uploadBtn = document.getElementById('uploadBtn');

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                showResult('Please select a file first.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="loader"></span> Uploading...';
            hideResult();

            try {
                // Using TmpFiles.org - More reliable for PDFs and Code files
                const response = await fetch('https://tmpfiles.org/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const resData = await response.json();
                    // tmpfiles returns a URL like https://tmpfiles.org/12345/name.ext
                    // We transform it into the browser-viewable URL
                    const rawUrl = resData.data.url;
                    const downloadUrl = rawUrl.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                    
                    showResult(`
                        ✅ Upload successful!<br>
                        Your Cloud Code is:<br>
                        <span class="code-display">${downloadUrl}</span>
                        Copy this link and send it to your friend.
                    `, 'success');
                    fileInput.value = ''; 
                } else {
                    const errorMsg = await response.text();
                    console.error('Upload error:', errorMsg);
                    showResult('Upload failed. Try a different file.', 'error');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showResult('Network error. Check if an AdBlocker is blocking the upload.', 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = 'Upload to Cloud';
            }
        }

        function downloadFile() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) {
                showResult('Please enter a code or link.', 'error');
                return;
            }
            
            // If it's a link, go to it. If it's just a code, we can't do much with tmpfiles
            // so we assume they paste the whole link.
            if (code.startsWith('http')) {
                window.location.href = code;
            } else {
                showResult('Please paste the full link provided during upload.', 'error');
            }
        }

        function showResult(html, type) {
            resultDiv.innerHTML = html;
            resultDiv.className = type;
            resultDiv.style.display = 'block';
        }

        function hideResult() {
            resultDiv.style.display = 'none';
        }
    </script>
</body>
</html>
