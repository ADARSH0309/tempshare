<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempShare - Smart Edition</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 32px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-fill-color: transparent;
            -webkit-background-clip: text;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .code-display {
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            margin: 12px 0;
            display: block;
            color: var(--primary);
            word-break: break-all;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 style="background: linear-gradient(to right, #4f46e5, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TempShare Smart</h1>
            <p class="subtitle">Bypasses ISP blocks using Smart-Routing.</p>

            <div class="form-group">
                <label for="fileInput">Choose PDF or .py File</label>
                <input type="file" id="fileInput">
            </div>
            <button id="uploadBtn" onclick="uploadFile()">Upload Now</button>

            <div id="result"></div>

            <div style="margin-top: 24px; font-size: 11px; color: #94a3b8; text-align: center;">
                If it fails, it will automatically try another server.
            </div>
        </div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        const uploadBtn = document.getElementById('uploadBtn');

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                showResult('Please select a file.', 'error');
                return;
            }

            uploadBtn.disabled = true;
            hideResult();

            // List of servers to try in order
            const servers = [
                { name: 'Pixeldrain', url: 'https://pixeldrain.com/api/file' },
                { name: 'TmpFiles', url: 'https://tmpfiles.org/api/v1/upload' },
                { name: 'GoFile', url: 'https://api.gofile.io/getServer' }
            ];

            for (let i = 0; i < servers.length; i++) {
                const server = servers[i];
                uploadBtn.innerHTML = `<span class="loader"></span> Trying ${server.name}...`;

                try {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);

                    // We use a different proxy for each try
                    const proxy = i === 0 ? 'https://api.allorigins.win/raw?url=' : 'https://corsproxy.io/?';
                    
                    const response = await fetch(proxy + encodeURIComponent(server.url), {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        const data = await response.json();
                        let link = '';
                        
                        if (server.name === 'Pixeldrain') link = `https://pixeldrain.com/u/${data.id}`;
                        if (server.name === 'TmpFiles') link = data.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                        
                        showResult(`
                            ✅ Success!<br>
                            Link for your friend:<br>
                            <span class="code-display">${link}</span>
                        `, 'success');
                        fileInput.value = '';
                        return; // Stop after first success
                    }
                } catch (e) {
                    console.log(`${server.name} failed, trying next...`);
                }
            }

            showResult('All servers blocked by your Wi-Fi. Try using your Mobile Hotspot.', 'error');
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = 'Upload Now';
        }

        function showResult(html, type) {
            resultDiv.innerHTML = html;
            resultDiv.className = type;
            resultDiv.style.display = 'block';
        }

        function hideResult() {
            resultDiv.style.display = 'none';
        }
    </script>
</body>
</html>
