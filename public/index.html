<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempShare v2.0 - Ultimate Fix</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a; /* Darker background to distinguish version */
            --card: #1e293b;
            --text: #f1f5f9;
            --subtext: #94a3b8;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .version-tag {
            display: block;
            text-align: center;
            font-size: 10px;
            color: #4ade80;
            margin-bottom: 24px;
            font-weight: bold;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: var(--subtext); }
        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .success { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .code-display {
            font-family: monospace;
            font-size: 32px;
            letter-spacing: 4px;
            margin: 10px 0;
            display: block;
            color: white;
        }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            width: 16px; height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>TempShare</h1>
            <span class="version-tag">VERSION 2.0 (ANTI-BLOCK)</span>

            <div class="form-group">
                <label>Select File (Max 4MB)</label>
                <input type="file" id="fileInput">
            </div>
            <button id="uploadBtn" onclick="uploadFile()">UPLOAD NOW</button>

            <div id="result"></div>

            <div style="margin: 25px 0; height: 1px; background: #334155;"></div>

            <div class="form-group">
                <label>Enter 6-Digit Code</label>
                <input type="text" id="codeInput" maxlength="6" placeholder="A1B2C3" style="text-transform: uppercase; text-align: center; font-family: monospace; font-size: 20px;">
            </div>
            <button id="downloadBtn" onclick="downloadFile()">DOWNLOAD</button>
        </div>
    </div>

    <script>
        const res = document.getElementById('result');
        const btn = document.getElementById('uploadBtn');

        function showMsg(html, type) {
            res.innerHTML = html;
            res.className = type;
            res.style.display = 'block';
        }

        async function uploadFile() {
            const input = document.getElementById('fileInput');
            if (!input.files[0]) return showMsg('Select a file!', 'error');
            
            const file = input.files[0];
            if (file.size > 4.5 * 1024 * 1024) return showMsg('File too large (Max 4MB)', 'error');

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> BYPASSING ISP...';
            res.style.display = 'none';

            try {
                const base64 = await new Promise((r, j) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => r(reader.result.split(',')[1]);
                    reader.onerror = j;
                });

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file: base64, filename: file.name })
                });

                const data = await response.json();
                if (response.ok) {
                    showMsg(`
                        ✅ UPLOADED!<br>
                        CODE: <span class="code-display">${data.code}</span>
                        <a href="${data.shortUrl}" target="_blank" style="color: #818cf8;">Open Short Link</a>
                    `, 'success');
                    input.value = '';
                } else {
                    showMsg('SERVER ERROR: ' + (data.error || 'Unknown'), 'error');
                }
            } catch (e) {
                showMsg('NETWORK ERROR: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'UPLOAD NOW';
            }
        }

        async function downloadFile() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            if (code.length !== 6) return showMsg('Enter 6 chars!', 'error');
            
            const dBtn = document.getElementById('downloadBtn');
            dBtn.disabled = true;
            
            try {
                const r = await fetch(`https://kvdb.io/K99U4v7Y8vXN6t8pP6r1G1/${code}`);
                if (r.ok) {
                    window.location.href = await r.text();
                } else {
                    showMsg('Invalid Code!', 'error');
                }
            } catch (e) {
                showMsg('Database Error!', 'error');
            } finally {
                dBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
