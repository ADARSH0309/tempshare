<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempShare - Ultimate Edition</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 32px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 32px 0;
            position: relative;
        }
        .divider::after {
            content: "OR";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            padding: 0 12px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }
        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .code-display {
            font-family: monospace;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            margin: 12px 0;
            display: block;
            color: var(--primary);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>TempShare</h1>
            <p class="subtitle">Ultimate Proxy Edition (Bypasses All ISP Blocks)</p>

            <div class="form-group">
                <label for="fileInput">Choose File (Max 6MB)</label>
                <input type="file" id="fileInput">
            </div>
            <button id="uploadBtn" onclick="uploadFile()">Generate Code</button>

            <div id="result"></div>

            <div class="divider"></div>

            <div class="form-group">
                <label for="codeInput">Enter 6-Digit Code</label>
                <input type="text" id="codeInput" placeholder="e.g. RJ9K2L" maxlength="6" style="text-transform: uppercase; text-align: center;">
            </div>
            <button id="downloadBtn" onclick="downloadFile()">Download File</button>
        </div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        const uploadBtn = document.getElementById('uploadBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        const KV_API = 'https://kvdb.io/K99U4v7Y8vXN6t8pP6r1G1/';

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                showResult('Please select a file.', 'error');
                return;
            }

            const file = fileInput.files[0];
            if (file.size > 6 * 1024 * 1024) {
                showResult('File too large for proxy. Max 6MB.', 'error');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="loader"></span> Bypassing ISP...';
            hideResult();

            try {
                // Convert file to base64 to send to Netlify Function
                const base64 = await toBase64(file);
                
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: JSON.stringify({
                        file: base64.split(',')[1],
                        filename: file.name
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    showResult(`
                        ✅ Success!<br>
                        Your Code:<br>
                        <span class="code-display">${data.code}</span>
                    `, 'success');
                    fileInput.value = '';
                } else {
                    showResult('Proxy error. Try again.', 'error');
                }
            } catch (error) {
                showResult('Network Error. Is your internet connected?', 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = 'Generate Code';
            }
        }

        async function downloadFile() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            if (code.length !== 6) {
                showResult('Enter a 6-digit code.', 'error');
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<span class="loader"></span> Fetching...';

            try {
                const response = await fetch(`${KV_API}${code}`);
                if (response.ok) {
                    const url = await response.text();
                    window.open(url, '_blank');
                    showResult('Redirecting...', 'success');
                } else {
                    showResult('Code not found.', 'error');
                }
            } catch (error) {
                showResult('Network Error.', 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = 'Download File';
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function showResult(html, type) {
            resultDiv.innerHTML = html;
            resultDiv.className = type;
            resultDiv.style.display = 'block';
        }

        function hideResult() {
            resultDiv.style.display = 'none';
        }
    </script>
</body>
</html>
