<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempShare - Super Stable</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 32px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 32px 0;
            position: relative;
        }
        .divider::after {
            content: "OR";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            padding: 0 12px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }
        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .code-display {
            font-family: monospace;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 12px 0;
            display: block;
            color: var(--primary);
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>TempShare</h1>
            <p class="subtitle">Fast, Reliable, Cloud-Powered.</p>

            <div class="form-group">
                <label for="fileInput">Choose File (.py, .pdf, etc.)</label>
                <input type="file" id="fileInput">
            </div>
            <button id="uploadBtn" onclick="uploadFile()">Generate Short Code</button>

            <div id="result"></div>

            <div class="divider"></div>

            <div class="form-group">
                <label for="codeInput">Enter 6-Character Code</label>
                <input type="text" id="codeInput" placeholder="e.g. RJ9K2L" maxlength="10" style="text-transform: uppercase; text-align: center;">
            </div>
            <button id="downloadBtn" onclick="downloadFile()">Download File</button>
        </div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        const uploadBtn = document.getElementById('uploadBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // This is a more stable Key-Value store
        const KV_API = 'https://kvdb.io/K99U4v7Y8vXN6t8pP6r1G1/';

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                showResult('Please select a file.', 'error');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="loader"></span> Connecting to Cloud...';
            hideResult();

            try {
                // 1. Get the best server from GoFile
                const serverRes = await fetch('https://api.gofile.io/getServer');
                const serverData = await serverRes.json();
                const server = serverData.data.server;

                // 2. Upload file to that server
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);

                uploadBtn.innerHTML = '<span class="loader"></span> Uploading...';
                const uploadRes = await fetch(`https://${server}.gofile.io/uploadFile`, {
                    method: 'POST',
                    body: formData
                });

                const uploadData = await uploadRes.json();
                if (uploadData.status === 'ok') {
                    const downloadPage = uploadData.data.downloadPage;
                    // GoFile ID is already quite short, but let's make it a 6-char code
                    const shortCode = Math.random().toString(36).substr(2, 6).toUpperCase();

                    // 3. Save mapping
                    await fetch(`${KV_API}${shortCode}`, {
                        method: 'POST',
                        body: downloadPage
                    });

                    showResult(`
                        ✅ Upload Successful!<br>
                        Your Code is:<br>
                        <span class="code-display">${shortCode}</span>
                    `, 'success');
                    fileInput.value = '';
                } else {
                    showResult('Cloud server busy. Try again.', 'error');
                }
            } catch (error) {
                console.error(error);
                showResult('Network Error. Please try turning off your VPN or using Mobile Data.', 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = 'Generate Short Code';
            }
        }

        async function downloadFile() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            if (!code) {
                showResult('Please enter a code.', 'error');
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<span class="loader"></span> Fetching...';

            try {
                const response = await fetch(`${KV_API}${code}`);
                if (response.ok) {
                    const url = await response.text();
                    window.open(url, '_blank'); // Open GoFile download page
                    showResult('Redirecting to download page...', 'success');
                } else {
                    showResult('Code not found or expired.', 'error');
                }
            } catch (error) {
                showResult('Error connecting to database.', 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = 'Download File';
            }
        }

        function showResult(html, type) {
            resultDiv.innerHTML = html;
            resultDiv.className = type;
            resultDiv.style.display = 'block';
        }

        function hideResult() {
            resultDiv.style.display = 'none';
        }
    </script>
</body>
</html>
